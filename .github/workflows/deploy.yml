name: Pulse CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pulse-backend:latest portal/backend/

      - name: Build frontend image
        run: docker build -t pulse-frontend:latest portal/frontend/
